<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Place — Item Build-Up Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252b3b;
    --accent: #c8f060;
    --accent2: #60d4f0;
    --text: #e8eaf0;
    --muted: #6b7280;
    --warn: #f0b060;
    --red: #f06060;
    --labour: #60d4f0;
    --plant: #c8f060;
    --material: #f0b060;
    --subcon: #b060f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    background: linear-gradient(180deg, #141829 0%, var(--bg) 100%);
  }
  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .total-pill {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 10px 20px;
    text-align: right;
  }
  .total-pill .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .total-pill .value { font-size: 1.5rem; color: var(--accent); font-weight: 500; }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,96,0.06);
  }
  .oncost-control {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .oncost-control label { text-transform: uppercase; letter-spacing: 0.08em; }
  .oncost-control input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    width: 70px;
    outline: none;
  }
  .oncost-control input:focus { border-color: var(--accent); }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg);
    padding: 18px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .summary-card:hover { background: var(--surface); }
  .summary-card .cat-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .summary-card .cat-value {
    font-size: 1.1rem;
    font-weight: 500;
  }
  .summary-card .cat-count {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* MAIN TABLE */
  .table-wrap {
    padding: 24px 40px 60px;
  }
  .section-header {
    display: grid;
    grid-template-columns: 60px 1fr 80px 100px 100px 100px 100px 120px 40px;
    gap: 8px;
    padding: 10px 14px;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    position: sticky;
    top: 61px;
    background: var(--bg);
    z-index: 50;
  }

  .section-group { margin-bottom: 24px; }
  .section-group-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 14px 14px 6px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-group-title .group-total {
    margin-left: auto;
    color: var(--text);
    font-size: 0.78rem;
  }

  .item-row {
    display: grid;
    grid-template-columns: 60px 1fr 80px 100px 100px 100px 100px 120px 40px;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 3px;
    transition: background 0.12s;
    cursor: pointer;
    align-items: start;
    margin-bottom: 2px;
  }
  .item-row:hover { background: var(--surface); }
  .item-row.provisional { opacity: 0.7; }
  .item-row .ref {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 500;
  }
  .item-row .desc {
    font-size: 0.74rem;
    color: var(--text);
    line-height: 1.4;
  }
  .item-row .desc .sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .item-row .qty {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
  }
  .item-row .rate, .item-row .nett, .item-row .gross {
    font-size: 0.72rem;
    text-align: right;
  }
  .item-row .nett { color: var(--text); }
  .item-row .gross { color: var(--accent); font-weight: 500; }
  .item-row .bar-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding-top: 3px;
  }
  .mini-bar {
    height: 4px;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* EXPAND PANEL */
  .expand-panel {
    display: none;
    background: var(--surface);
    border-left: 2px solid var(--accent);
    margin: 0 0 6px 74px;
    border-radius: 0 4px 4px 0;
    padding: 14px 18px;
    font-size: 0.72rem;
  }
  .expand-panel.open { display: block; }
  .breakdown-table { width: 100%; border-collapse: collapse; }
  .breakdown-table th {
    text-align: left;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  .breakdown-table td {
    padding: 5px 8px;
    border-bottom: 1px solid rgba(37,43,59,0.5);
    font-size: 0.7rem;
    color: var(--text);
  }
  .breakdown-table td.type-L { color: var(--labour); }
  .breakdown-table td.type-P { color: var(--plant); }
  .breakdown-table td.type-M { color: var(--material); }
  .breakdown-table td.type-S { color: var(--subcon); }
  .breakdown-footer {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .breakdown-footer .bf-item {
    font-size: 0.68rem;
  }
  .breakdown-footer .bf-item .bf-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
  .breakdown-footer .bf-item .bf-val { font-weight: 500; }

  /* PROVISIONAL BADGE */
  .badge {
    display: inline-block;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.prov { background: rgba(240,176,96,0.15); color: var(--warn); border: 1px solid rgba(240,176,96,0.3); }
  .badge.bo { background: rgba(96,212,240,0.1); color: var(--accent2); border: 1px solid rgba(96,212,240,0.3); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    padding: 0 40px 0;
    font-size: 0.63rem;
    color: var(--muted);
    align-items: center;
    flex-wrap: wrap;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 4px; }

  /* NO RESULTS */
  .no-results {
    padding: 60px 40px;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* QTY EDIT */
  .qty-edit {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    width: 70px;
    text-align: right;
    outline: none;
    padding: 0 0 1px;
  }
  .qty-edit:focus { border-bottom-color: var(--accent); color: var(--accent); }
</style>
</head>

// ───────────────────────────────────────────────
// COMPUTE & STATE
// ───────────────────────────────────────────────
let quantities = {};
items.forEach(it => { quantities[it.ref] = it.qty; });

function getOncost() {
  return parseFloat(document.getElementById('oncost').value) || 0;
}

const GW_DAY_HRS = 9;

function gwHrsPerUnit(item) {
  const gw = item.resources.find(r => r.name.toLowerCase().includes('groundworker'));
  return gw ? gw.qty : null;
}

function gwOutputPerDay(item) {
  const hrs = gwHrsPerUnit(item);
  if (!hrs || hrs === 0) return null;
  return GW_DAY_HRS / hrs;
}

function labourHrs(item, qty) {
  return item.resources
    .filter(r => r.type === 'L')
    .reduce((s, r) => s + r.qty * qty, 0);
}

function breakdown(item, qty) {
  let L=0, P=0, M=0, S=0;
  item.resources.forEach(r => {
    const v = r.up * qty;
    if(r.type==='L') L+=v;
    else if(r.type==='P') P+=v;
    else if(r.type==='M') M+=v;
    else S+=v;
  });
  return {L,P,M,S};
}

function fmt(n) {
  return '£' + n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmt2(n) {
  return '£' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

// ───────────────────────────────────────────────
// CATEGORIES
// ───────────────────────────────────────────────
const CAT_COLORS = {
  DEMOLITION:'#f06060', PLANTERS:'#c8f060', TIMBER:'#f0b060',
  PAVING:'#60d4f0', CLAY:'#b060f0', DRAINAGE:'#60f0b0', ELECTRICAL:'#f06090'
};
const CAT_LABELS = {
  DEMOLITION:'Demolition & Alterations', PLANTERS:'Planters',
  TIMBER:'Timber Furniture', PAVING:'Paving', CLAY:'Clay Pots',
  DRAINAGE:'Drainage', ELECTRICAL:'Electrical'
};

// ───────────────────────────────────────────────
// RENDER
// ───────────────────────────────────────────────
let activeFilter = 'ALL';

function renderSummary() {
  const oncost = getOncost();
  const grid = document.getElementById('summary-grid');
  const cats = ['DEMOLITION','PLANTERS','TIMBER','PAVING','CLAY','DRAINAGE','ELECTRICAL'];
  let html = '';
  let grandNett = 0, grandGross = 0;
  cats.forEach(cat => {
    const catItems = items.filter(i => i.cat === cat);
    const nett = catItems.reduce((s,i) => s + i.rate * quantities[i.ref], 0);
    const gross = nett * (1 + oncost/100);
    grandNett += nett; grandGross += gross;
    html += `<div class="summary-card" onclick="filterCat('${cat}')">
      <div class="cat-label">${CAT_LABELS[cat]}</div>
      <div class="cat-value" style="color:${CAT_COLORS[cat]}">${fmt(nett)}</div>
      <div class="cat-count">${catItems.length} items · gross ${fmt(gross)}</div>
    </div>`;
  });
  grid.innerHTML = html;
  document.getElementById('grand-nett').textContent = fmt(grandNett);
  document.getElementById('grand-gross').textContent = fmt(grandGross);
}

function filterCat(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderItems();
}

function renderItems() {
  const oncost = getOncost();
  const search = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('items-container');

  const cats = activeFilter === 'ALL'
    ? ['DEMOLITION','PLANTERS','TIMBER','PAVING','CLAY','DRAINAGE','ELECTRICAL']
    : [activeFilter];

  let html = '';
  let anyItem = false;

  cats.forEach(cat => {
    const catItems = items.filter(i => {
      if(i.cat !== cat) return false;
      if(search && !i.desc.toLowerCase().includes(search) && !i.ref.toLowerCase().includes(search)) return false;
      return true;
    });
    if(!catItems.length) return;
    anyItem = true;

    const catTotal = catItems.reduce((s,i) => s + i.rate * quantities[i.ref], 0);
    html += `<div class="section-group">
      <div class="section-group-title">
        <span style="color:${CAT_COLORS[cat]}">▮</span> ${CAT_LABELS[cat]}
        <span class="group-total">${fmt(catTotal)}</span>
      </div>`;

    catItems.forEach(item => {
      const qty = quantities[item.ref];
      const nett = item.rate * qty;
      const gross = nett * (1 + oncost/100);
      const hrs = labourHrs(item, qty);
      const gwOut = gwOutputPerDay(item);
      const gwHrs = gwHrsPerUnit(item);
      const bd = breakdown(item, qty);
      const total = bd.L + bd.P + bd.M + bd.S;
      const maxW = 90;
      const wL = total ? Math.round(bd.L/total*maxW) : 0;
      const wP = total ? Math.round(bd.P/total*maxW) : 0;
      const wM = total ? Math.round(bd.M/total*maxW) : 0;
      const wS = Math.max(0, maxW - wL - wP - wM);

      const provBadge = item.provisional ? '<span class="badge prov">prov</span>' : '';

      html += `<div class="item-row${item.provisional?' provisional':''}" onclick="toggleExpand('${item.ref}')">
        <div class="ref">${item.ref}</div>
        <div class="desc">${item.desc}${provBadge}</div>
        <div class="qty">
          <input class="qty-edit" type="number" value="${qty}" min="0" data-ref="${item.ref}"
            onclick="event.stopPropagation()" onchange="updateQty('${item.ref}', this.value)">
          <div style="font-size:0.6rem;color:var(--muted);margin-top:1px">${item.unit}</div>
        </div>
        <div class="rate">${fmt2(item.rate)}</div>
        <div class="nett">${fmt(nett)}</div>
        <div class="gross">${fmt(gross)}</div>
        <div class="rate" style="color:var(--labour)">${gwOut !== null ? gwOut.toFixed(1) + ' ' + item.unit + '/day' : '—'}</div>
        <div class="bar-col">
          <div class="mini-bar" style="background:var(--labour);width:${wL}px"></div>
          <div class="mini-bar" style="background:var(--plant);width:${wP}px"></div>
          <div class="mini-bar" style="background:var(--material);width:${wM}px"></div>
          <div class="mini-bar" style="background:var(--subcon);width:${wS}px"></div>
        </div>
        <div style="font-size:1rem;color:var(--muted);text-align:center">▸</div>
      </div>
      <div class="expand-panel" id="exp-${item.ref.replace('*','s')}">
        <table class="breakdown-table">
          <thead><tr><th>Resource</th><th>Type</th><th>Qty/Unit</th><th>Rate</th><th>Unit Price</th><th>Total (×${qty})</th></tr></thead>
          <tbody>
            ${item.resources.map(r=>`<tr>
              <td class="type-${r.type}">${r.name}</td>
              <td class="type-${r.type}">${{L:'Labour',P:'Plant',M:'Material',S:'Subcon/Other'}[r.type]}</td>
              <td>${r.qty} ${r.unit}</td>
              <td>${fmt2(r.rate)}</td>
              <td>${fmt2(r.up)}</td>
              <td>${fmt(r.up * qty)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="breakdown-footer">
          <div class="bf-item"><div class="bf-label">Labour</div><div class="bf-val" style="color:var(--labour)">${fmt(bd.L)}</div></div>
          <div class="bf-item"><div class="bf-label">Plant</div><div class="bf-val" style="color:var(--plant)">${fmt(bd.P)}</div></div>
          <div class="bf-item"><div class="bf-label">Material</div><div class="bf-val" style="color:var(--material)">${fmt(bd.M)}</div></div>
          <div class="bf-item"><div class="bf-label">Subcon/Other</div><div class="bf-val" style="color:var(--subcon)">${fmt(bd.S)}</div></div>
          <div class="bf-item"><div class="bf-label">Nett Total</div><div class="bf-val">${fmt(nett)}</div></div>
          <div class="bf-item"><div class="bf-label">Gross (+${oncost}%)</div><div class="bf-val" style="color:var(--accent)">${fmt(gross)}</div></div>
          <div class="bf-item"><div class="bf-label">GW Output/Day</div><div class="bf-val" style="color:var(--labour)">${gwOut !== null ? gwOut.toFixed(1) + ' ' + item.unit + '/day' : '—'}</div></div>
          <div class="bf-item"><div class="bf-label">GW hrs/unit</div><div class="bf-val" style="color:var(--labour)">${gwHrs !== null ? gwHrs.toFixed(3) + ' hr' : '—'}</div></div>
          <div class="bf-item"><div class="bf-label">Total Labour Hrs</div><div class="bf-val" style="color:var(--labour)">${hrs.toFixed(1)} hrs</div></div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  if(!anyItem) html = '<div class="no-results">No items match your search.</div>';
  container.innerHTML = html;
}

function toggleExpand(ref) {
  const id = 'exp-' + ref.replace('*','s');
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function updateQty(ref, val) {
  quantities[ref] = parseFloat(val) || 0;
  renderSummary();
  renderItems();
}

// ───────────────────────────────────────────────
// EVENTS
// ───────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderItems();
  });
});

document.getElementById('search').addEventListener('input', renderItems);
document.getElementById('oncost').addEventListener('input', () => {
  renderSummary();
  renderItems();
});

// INIT
renderSummary();
renderItems();
</script>
